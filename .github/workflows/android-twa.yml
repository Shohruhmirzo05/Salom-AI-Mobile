name: Android TWA build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/twa/**"
      - ".github/workflows/android-twa.yml"
  pull_request:
    paths:
      - "android/twa/**"
      - ".github/workflows/android-twa.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: android/twa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Compile debug shell
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Preserve debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: salom-ai-android-twa-debug
          path: android/twa/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
